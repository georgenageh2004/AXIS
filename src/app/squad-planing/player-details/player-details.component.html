<div *ngIf="player" class="player-details-card">
    <p class="card-title">Player details</p>

    <div class="player-header">
        <img [src]="player.image" alt="{{ player.name }}">
        <div class="header-info">
            <h2>{{ player.name }}</h2>
            <p class="age-pos">Age: {{ player.age }} | {{ player.position }}</p>
            <!-- <img [src]="player.flagImage" alt="Flag" class="flag-icon">  -->
        </div>
    </div>

    <div class="fitness-section">
        <p class="fitness-label">Fitness</p>
        <div class="fitness-bar-container">
            <div class="fitness-bar" [style.width]="player.fitness"></div>
            <span class="fitness-value">{{ player.fitness }}</span>
        </div>
    </div>

    <div class="stats-section">
        <div class="stat-item">
            <span class="stat-label">Matches played</span>
            <span class="stat-value">{{ player.matchesPlayed }}</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Assists</span>
            <span class="stat-value">{{ player.assists }}</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Pass Accuracy</span>
            <span class="stat-value pass-accuracy-value">{{ player.passAccuracy }}</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Tackles</span>
            <span class="stat-value">{{ player.tackles }}</span>
        </div>
    </div>
</div>
