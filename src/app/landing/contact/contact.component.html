
<section class="contact-section">
    <div class="container">
        <h1 class="main-title">Get in <span>Touch</span></h1>
        <p class="subtitle">Have questions about Axis scouting analytics? Our team is ready to help you optimize your tactical data.</p>

        <div class="contact-card">
            <form>
                <div class="form-group">
                    <label for="name">FULL NAME</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" placeholder="email@axis-analytics.com">
                </div>

                <div class="form-group">
                    <label for="message">MESSAGE</label>
                    <textarea id="message" rows="5" placeholder="How can we assist your scouting process?"></textarea>
                </div>

                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <i class="fa-regular fa-envelope"></i>
                <span>hq&#64;axis.io</span>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>London, UK</span>
            </div>
            <div class="info-item">
                <i class="fa-regular fa-comment-dots"></i>
                <span>Live Support</span>
            </div>
        </div>
    </div>
</section>
