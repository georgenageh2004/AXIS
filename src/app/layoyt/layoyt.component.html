<div class="layout" [class.profile-overlay]="isProfileRoute">
	<button
		type="button"
		class="mobile-menu-btn"
		aria-label="Toggle sidebar"
		[attr.aria-expanded]="isSidebarOpen"
		(click)="toggleSidebar()"
	>
		<span></span>
		<span></span>
		<span></span>
	</button>

	<div class="sidebar-backdrop" [class.show]="isSidebarOpen" (click)="closeSidebar()"></div>

	<app-side-bar
		class="sidebar-shell"
		[isOpen]="isSidebarOpen"
		[overlayMode]="isProfileRoute"
		(closeRequested)="closeSidebar()"
	></app-side-bar>

	<div class="page-content" [class.profile-overlay]="isProfileRoute" (click)="closeSidebarOnOverlay()">
		<router-outlet></router-outlet>
	</div>
</div>
